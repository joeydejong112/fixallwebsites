<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>ScanPulse — Diagnose · Fix · Verify</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/landing.jsx"></script>
  <script type="text/babel" src="src/dashboard.jsx"></script>
  <script type="text/babel" src="src/result.jsx"></script>
  <script type="text/babel" src="src/tools.jsx"></script>
  <script type="text/babel" src="src/csp.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SCREEN_LABELS = {
      landing:   "01 Landing",
      dashboard: "02 Dashboard",
      result:    "03 Scan Result",
      tools:     "04 Tools Index",
      csp:       "05 CSP Builder",
    };

    function App() {
      const [screen, setScreenState] = useState(() => {
        try { return localStorage.getItem("scanpulse:screen") || "landing"; } catch { return "landing"; }
      });
      const setScreen = (s) => {
        setScreenState(s);
        try { localStorage.setItem("scanpulse:screen", s); } catch {}
      };

      // Keyboard: 1-5 to jump between screens
      useEffect(() => {
        const keys = { "1": "landing", "2": "dashboard", "3": "result", "4": "tools", "5": "csp" };
        const h = (e) => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
          if (keys[e.key]) setScreen(keys[e.key]);
        };
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
      }, []);

      const isApp = screen !== "landing";

      return (
        <div data-screen-label={SCREEN_LABELS[screen]} style={{
          minHeight: "100vh",
          height: "100vh",
          background: "var(--canvas)",
          display: "flex",
          flexDirection: "column",
          overflow: "hidden",
        }}>
          <ScreenSwitcher current={screen} onGo={setScreen} />

          {screen === "landing" && <LandingScreen />}
          {isApp && (
            <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
              <Rail current={screen} onGo={setScreen} />
              <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
                <TopStrip current={screen} />
                <div style={{ flex: 1, overflowY: "auto" }}>
                  {screen === "dashboard" && <DashboardScreen onGo={setScreen} />}
                  {screen === "result"    && <ResultScreen    onGo={setScreen} />}
                  {screen === "tools"     && <ToolsScreen     onGo={setScreen} />}
                  {screen === "csp"       && <CSPScreen />}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Screen switcher — floating pill, bottom-center
    function ScreenSwitcher({ current, onGo }) {
      const screens = [
        { key: "landing",   label: "Landing" },
        { key: "dashboard", label: "Dashboard" },
        { key: "result",    label: "Scan Result" },
        { key: "tools",     label: "Tools" },
        { key: "csp",       label: "CSP Builder" },
      ];
      return (
        <div style={{
          position: "fixed",
          bottom: 22,
          left: "50%",
          transform: "translateX(-50%)",
          zIndex: 100,
          background: "rgba(15, 15, 20, 0.85)",
          border: "1px solid var(--border-strong)",
          borderRadius: 999,
          padding: 5,
          display: "flex",
          gap: 2,
          backdropFilter: "blur(20px)",
          boxShadow: "0 20px 50px rgba(0, 0, 0, 0.5), 0 0 60px rgba(236, 53, 134, 0.1)",
        }}>
          {screens.map((s, i) => (
            <button key={s.key} onClick={() => onGo(s.key)} style={{
              padding: "8px 16px",
              borderRadius: 999,
              border: "none",
              background: current === s.key ? "var(--brand)" : "transparent",
              color: current === s.key ? "#fff" : "var(--text-muted)",
              fontFamily: "var(--font-display)",
              fontSize: 12,
              fontWeight: 600,
              letterSpacing: "-0.01em",
              cursor: "pointer",
              display: "flex",
              alignItems: "center",
              gap: 7,
              transition: "background 0.2s, color 0.2s",
            }}>
              <span style={{
                fontFamily: "var(--font-mono)",
                fontSize: 10,
                opacity: current === s.key ? 0.85 : 0.5,
              }}>0{i + 1}</span>
              {s.label}
            </button>
          ))}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
